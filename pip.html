<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' pip:; img-src pip: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #frame { width: 100%; height: 100%; display: block; object-fit: fill; }
  </style>
</head>
<body>
  <img id="frame" alt="" />
  <script>
    const pid = new URLSearchParams(window.location.search).get('pid') || '0';
    const img = document.getElementById('frame');
    setInterval(() => {
      img.src = 'pip://localhost/frame/' + pid + '?t=' + Date.now();
    }, 50);
  </script>
</body>
</html>
